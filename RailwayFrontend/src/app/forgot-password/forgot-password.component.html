<app-navigationbar></app-navigationbar>

<div class="background-wrapper">
  <img src="/assets/bg.jpg" alt="Background" class="background-image" />

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-card shadow-lg p-4 border-0 rounded-4" style="max-width: 420px; width: 100%;">
      <h4 class="text-center mb-4 text-success">Forgot Password</h4>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input
            formControlName="email"
            type="email"
            class="form-control"
            id="email"
            placeholder="Enter your email address"
            required
          />
          <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" 
               class="text-danger small mt-1">
            Please enter a valid email address
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="forgotPasswordForm.invalid">
          Send Reset Token
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none small">Back to Login</a>
      </div>

      <div *ngIf="responseMessage" class="mt-3 text-center">
        <div [ngClass]="{
          'alert alert-success': isSuccess,
          'alert alert-danger': !isSuccess
        }">
          {{ responseMessage }}
        </div>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
