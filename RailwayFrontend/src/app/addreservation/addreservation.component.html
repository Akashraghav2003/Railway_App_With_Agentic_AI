<app-header></app-header>
<div class="page-wrapper">
  <div class="d-flex">
    <app-usersidebar></app-usersidebar>
    <div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <i class="bi bi-ticket-perforated-fill"></i> Add Reservation
    </div>
    <div class="card-body">
      <form [formGroup]="reservationForm" (ngSubmit)="onSubmit()">
        <!-- User ID - Hidden -->
        <input type="hidden" formControlName="userID" />

        <!-- Train ID - Hidden -->
        <input type="hidden" formControlName="trainId" />

        <!-- Travel Date -->
        <div class="mb-3">
          <label class="form-label">Travel Date</label>
          <input type="date" class="form-control" formControlName="travelDate" />
        </div>

        <!-- Class ID - Hidden -->
        <input type="hidden" formControlName="classId" />

        <!-- Number of Seats -->
        <div class="mb-3">
          <label class="form-label">No. of Seats</label>
          <input type="number" class="form-control" formControlName="noOfSeats" />
        </div>

        <!-- Quota -->
        <div class="mb-3">
          <label class="form-label">Quota</label>
          <input type="text" class="form-control" formControlName="quota" maxlength="50" />
        </div>

        <!-- Bank Name -->
        <div class="mb-3">
          <label class="form-label">Bank Name</label>
          <input type="text" class="form-control" formControlName="bankName" maxlength="100" />
        </div>

        <!-- Passenger Details -->
        <div formArrayName="passenger">
          <div *ngFor="let passenger of passengerControls.controls; let i = index" [formGroupName]="i" class="border p-3 mb-3 rounded">
            <h6>
              <i class="bi bi-person-fill"></i> Passenger {{ i + 1 }}
              <button type="button" class="btn btn-sm btn-danger float-end" (click)="removePassenger(i)" *ngIf="passengerControls.length > 1">
                <i class="bi bi-x-circle"></i> Remove
              </button>
            </h6>

            <div class="mb-2">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" formControlName="name" />
            </div>

            <div class="mb-2">
              <label class="form-label">Age</label>
              <input type="number" class="form-control" formControlName="age" />
            </div>

            <div class="mb-2">
              <label class="form-label">Gender</label>
              <select class="form-select" formControlName="gender">
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="mb-2">
              <label class="form-label">Aadhar Card</label>
              <input type="number" class="form-control" formControlName="adharCard" />
            </div>
          </div>

          <button type="button" class="btn btn-outline-primary mb-3" (click)="addPassenger()">
            <i class="bi bi-person-plus-fill"></i> Add Passenger
          </button>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-success" [disabled]="reservationForm.invalid">
          <i class="bi bi-send-fill"></i> Submit
        </button>
      </form>
    </div>
  </div>
    </div>
  </div>
</div>
<app-footer></app-footer>

<!-- Success Popup -->
<div *ngIf="showSuccessPopup" class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="bi bi-check-circle"></i> Reservation Successful!</h5>
      </div>
      <div class="modal-body text-center">
        <i class="bi bi-ticket-perforated text-success" style="font-size: 3rem;"></i>
        <h4 class="mt-3">Ticket Reserved Successfully!</h4>
        <p class="mb-3">Your PNR: <strong>{{ reservationData?.pnrNumber }}</strong></p>
        <p>Would you like to download your ticket?</p>
      </div>
      <div class="modal-footer justify-content-center">
        <button type="button" class="btn btn-success me-2" (click)="downloadAndRedirect()">
          <i class="bi bi-download"></i> Download & Continue
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="closePopupAndRedirect()">
          Skip Download
        </button>
      </div>
    </div>
  </div>
</div>
