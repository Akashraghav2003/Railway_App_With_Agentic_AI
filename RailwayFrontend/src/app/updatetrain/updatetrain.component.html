<app-header></app-header>
<div class="page-wrapper">
  <div class="d-flex">
    <app-adminsidebar></app-adminsidebar>
    <div class="container mt-4">
      <h2 class="mb-4 text-warning">
        <i class="bi bi-pencil-square"></i> Update Train
      </h2>

      <form [formGroup]="trainForm" (ngSubmit)="onSubmit()" >
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Train ID:</label>
            <input type="number" class="form-control" formControlName="trainID" placeholder="Train ID" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Train Name:</label>
            <input class="form-control" formControlName="trainName" placeholder="Enter train name" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Total Seats:</label>
            <input type="number" class="form-control" formControlName="totalSeats" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Source Station:</label>
            <input class="form-control" formControlName="sourceStation" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Destination Station:</label>
            <input class="form-control" formControlName="destinationStation" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Departure Time:</label>
            <input type="datetime-local" class="form-control" formControlName="departureTime" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Arrival Time:</label>
            <input type="datetime-local" class="form-control" formControlName="arrivalTime" />
          </div>
        </div>

        <hr class="my-4" />
        <h5 class="text-secondary">
          <i class="bi bi-list-ul"></i> Train Classes
        </h5>

        <div formArrayName="trainClass" class="mb-3">
          <div *ngFor="let classGroup of trainClass.controls; let i = index" [formGroupName]="i"
            class="border p-3 mb-3 rounded bg-light">
            <div class="row">
              <div class="col-md-4">
                <label class="form-label">Class Name:</label>
                <input class="form-control" formControlName="className" />
              </div>
              <div class="col-md-4">
                <label class="form-label">Total Seats:</label>
                <input type="number" class="form-control" formControlName="totalSeat" />
              </div>
              <div class="col-md-3">
                <label class="form-label">Fare:</label>
                <input type="number" class="form-control" formControlName="fare" />
              </div>
              <div class="col-md-1 d-flex align-items-end">
                <button type="button" class="btn btn-outline-danger btn-sm" (click)="removeTrainClass(i)">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <button type="button" class="btn btn-outline-secondary" (click)="addTrainClass()">
            <i class="bi bi-plus-circle"></i> Add Class
          </button>
        </div>

        <div class="text-end">
          <button type="submit" class="btn btn-success px-4">
            <i class="bi bi-save"></i> Update
          </button>
        </div>
      </form>

      <p class="mt-3 text-success fw-semibold">{{ message }}</p>
    </div>
  </div>
  <app-footer></app-footer>
</div>
