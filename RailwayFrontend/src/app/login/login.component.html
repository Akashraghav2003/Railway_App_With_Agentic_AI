<app-navigationbar></app-navigationbar>

<div class="background-wrapper">
  <img src="/assets/bg.jpg" alt="Background" class="background-image" />

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-card shadow-lg p-4 border-0 rounded-4" style="max-width: 420px; width: 100%;">
      <h4 class="text-center mb-4 text-success">Welcome Back</h4>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="emailOrUserName" class="form-label">Email or Username</label>
          <input
            formControlName="emailOrUserName"
            type="text"
            class="form-control"
            id="emailOrUserName"
            placeholder="Enter your username or email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            formControlName="password"
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="loginForm.invalid">
          Login
        </button>
      </form>

      <div class="d-flex justify-content-between mt-3">
        <a routerLink="/register" class="text-decoration-none small">New user? Register</a>
        <a routerLink="/forgot-password" class="text-decoration-none small">Forgot password?</a>
      </div>

      <div *ngIf="responseMessage" class="mt-3 text-center">
        <div [ngClass]="{
          'alert alert-success': loginSuccess,
          'alert alert-danger': !loginSuccess
        }">
          {{ responseMessage }}
        </div>
      </div>
    </div>
  </div>
</div>
<app-footer></app-footer>
