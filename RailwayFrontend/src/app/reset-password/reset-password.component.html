<app-navigationbar></app-navigationbar>

<div class="background-wrapper">
  <img src="/assets/bg.jpg" alt="Background" class="background-image" />

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card login-card shadow-lg p-4 border-0 rounded-4" style="max-width: 420px; width: 100%;">
      <h4 class="text-center mb-4 text-success">Reset Password</h4>
      <p class="text-center text-muted small mb-4">Enter the token sent to {{ email }}</p>

      <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="token" class="form-label">Reset Token</label>
          <input
            formControlName="token"
            type="text"
            class="form-control"
            id="token"
            placeholder="Enter the token from your email"
            required
          />
          <div *ngIf="resetPasswordForm.get('token')?.invalid && resetPasswordForm.get('token')?.touched" 
               class="text-danger small mt-1">
            Token is required
          </div>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">New Password</label>
          <input
            formControlName="newPassword"
            type="password"
            class="form-control"
            id="newPassword"
            placeholder="Enter new password"
            required
          />
          <div *ngIf="resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched" 
               class="text-danger small mt-1">
            Password must contain at least one digit, one lowercase, one uppercase letter, one special character, and be 6-20 characters long
          </div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input
            formControlName="confirmPassword"
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Confirm new password"
            required
          />
          <div *ngIf="resetPasswordForm.hasError('passwordMismatch') && resetPasswordForm.get('confirmPassword')?.touched" 
               class="text-danger small mt-1">
            Passwords do not match
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100" [disabled]="resetPasswordForm.invalid">
          Reset Password
        </button>
      </form>

      <div class="text-center mt-3">
        <a routerLink="/login" class="text-decoration-none small">Back to Login</a>
      </div>

      <div *ngIf="responseMessage" class="mt-3 text-center">
        <div [ngClass]="{
          'alert alert-success': isSuccess,
          'alert alert-danger': !isSuccess
        }">
          {{ responseMessage }}
        </div>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
