<header class="bg-success text-white py-3 shadow">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-md-6">
        <h3 class="mb-0">
          <i class="bi bi-train-front"></i> Railway Management System
        </h3>
      </div>
      <div class="col-md-6 text-end">
        <span class="me-3">Welcome, {{ username }}!</span>
        <i class="bi bi-clock"></i> {{ currentTime | date:'medium' }}
        <button class="btn btn-outline-light btn-sm ms-3" (click)="logout()">
          <i class="bi bi-box-arrow-right"></i> Logout
        </button>
      </div>
    </div>
  </div>
</header>
